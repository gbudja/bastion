# ═══════════════════════════════════════════════════════════════════════
#  Bastion Configuration
#  Copy to bastion.yaml and customize for your environment
# ═══════════════════════════════════════════════════════════════════════

server:
  host: 0.0.0.0
  port: 8443
  debug: false
  # Set BASTION_SECRET_KEY in the environment before starting Bastion.

# ─── Firewall Engine ─────────────────────────────────────────────────
firewall:
  backend: nftables          # nftables (recommended) or iptables (legacy)
  default_policy: drop       # drop | accept | reject
  enable_ipv6: true
  rules_file: /etc/bastion/rules.yaml

  # Automatically apply rules on startup
  auto_apply: true

  # Enable connection tracking for stateful inspection
  conntrack: true

# ─── Monitoring ──────────────────────────────────────────────────────
monitoring:
  # Interval between metric collection cycles (seconds)
  interval: 5

  # How long to retain metrics in memory (seconds)
  # 86400 = 24 hours
  retention: 86400

  # Network interfaces to monitor (empty = all)
  interfaces: []

  # Enable host discovery via ARP table
  host_discovery: true

# ─── Plugins ─────────────────────────────────────────────────────────
plugins:
  directory: /etc/bastion/plugins
  enabled: []
    # - dns_filter
    # - bandwidth_monitor
    # - ids_suricata

# ─── Logging ─────────────────────────────────────────────────────────
logging:
  level: INFO                # DEBUG, INFO, WARNING, ERROR
  file: /var/log/bastion/bastion.log
  max_size: 10485760         # 10MB
  backup_count: 5
  syslog: false

# ─── Authentication ──────────────────────────────────────────────────
auth:
  enabled: false             # Enable dashboard authentication
  # method: local            # local, ldap, radius
  # users_file: /etc/bastion/users.yaml
